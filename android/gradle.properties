org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin's incremental compiler tries to compute relative paths between the
# Pub cache (C:) and this project (E:), which throws on Windows since you
# can't relativize across drive letters. Disabling incremental compilation
# avoids the crash entirely (falls back to a full, slightly slower compile).
kotlin.incremental=false
kotlin.incremental.android=false
